name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test:unit -- --run
      
      - name: Build project
        run: npm run build

      # Крок 4: Робота з секретами
      - name: Check Secrets Availability
        run: |
          if [ "${{ secrets.MY_PROJECT_API_KEY }}" != "" ]; then
            echo "Secret is successfully loaded!"
          else
            echo "Secret is missing!"
            exit 1
          fi